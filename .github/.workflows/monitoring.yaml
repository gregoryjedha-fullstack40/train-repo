name: IBM Attrition - Data Drift Monitoring

on:
  # Cadence d'observation "prod" : tous les jours à 06:00 UTC.
  # NB : les crons ne se déclenchent que depuis la branche par défaut (main).
  schedule:
    - cron: "0 6 * * *"
  # Déclenchement manuel (idéal pour la démo jury), fenêtre et seuil réglables.
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Fenêtre de prod analysée (heures)"
        required: false
        default: "24"
      drift_threshold:
        description: "Seuil de part de colonnes dérivées (0-1)"
        required: false
        default: "0.5"

# Nécessaire pour que `gh workflow run` puisse déclencher train.yaml
permissions:
  contents: read
  actions: write

concurrency:
  group: monitoring-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-monitoring.txt

      - name: Run Evidently drift report
        id: drift
        run: python run_monitoring.py
        env:
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '24' }}
          DRIFT_THRESHOLD: ${{ github.event.inputs.drift_threshold || '0.5' }}
          REPORT_HTML: drift_report.html
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Upload drift report (artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: |
            drift_report.html
            drift_summary.json
          retention-days: 30

      - name: Archive report to S3
        if: always()
        run: |
          STAMP=$(date -u +'%Y%m%d-%H%M%S')
          DEST="s3://${{ secrets.S3BUCKETNAME }}/monitoring/reports"
          aws s3 cp drift_report.html  "${DEST}/${STAMP}_drift_report.html"
          aws s3 cp drift_summary.json "${DEST}/${STAMP}_drift_summary.json"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Trigger retraining on drift
        if: steps.drift.outputs.drift_detected == 'true'
        run: |
          echo "Dérive détectée (share=${{ steps.drift.outputs.drift_share }}, \
            colonnes=${{ steps.drift.outputs.drifted_columns }}) -> réentraînement."
          gh workflow run train.yaml \
            --ref "${{ github.ref_name }}" \
            -f register_alias=challenger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
