name: IBM Attrition - Model (Re)Training

on:
  # Déclenchement MANUEL depuis l'onglet Actions, avec choix des hyperparamètres
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "RandomForest - nombre d'arbres"
        required: false
        default: "150"
      min_samples_split:
        description: "RandomForest - min_samples_split"
        required: false
        default: "8"
      register_alias:
        description: "Alias MLflow posé sur le modèle entraîné"
        required: false
        default: "challenger"
  # Déclenchement sur PUSH main (seulement si le code de train change)
  push:
    branches: ["main"]
    paths:
      - "train.py"
      - "requirements.txt"
      - ".github/workflows/**"
  # Déclenchement sur PULL REQUEST vers main
  pull_request:
    branches: ["main"]
    paths:
      - "train.py"
      - "requirements.txt"

# Empêche deux réentraînements concurrents d'écraser le même alias
concurrency:
  group: train-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train & register model
        run: python train.py
        env:
          # --- MLflow (serveur de tracking hébergé sur Hugging Face) ---
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          # --- Stockage des artefacts MLflow sur S3 ---
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          # --- Hyperparamètres : valeur saisie en manuel, sinon défaut sur push/PR ---
          N_ESTIMATORS: ${{ github.event.inputs.n_estimators || '150' }}
          MIN_SAMPLES_SPLIT: ${{ github.event.inputs.min_samples_split || '8' }}
          REGISTER_ALIAS: ${{ github.event.inputs.register_alias || 'challenger' }}
